<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ইসলামিক মাসআলা সহায়িকা</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
}

body{
background:#07140c;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
padding:6px;
}

.app{
width:100%;
max-width:560px;
height:98vh;
background:#fff;
border-radius:16px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.header{
padding:14px;
background:#123222;
flex-shrink:0;
}

.header h2{
color:#d5ffd5;
font-size:18px;
}

.header p{
color:#8dc78d;
font-size:11px;
margin-top:4px;
}

.tabs{
display:flex;
background:#f4f4f4;
border-bottom:1px solid #ddd;
flex-shrink:0;
}

.tab{
flex:1;
padding:11px 4px;
font-size:12px;
border:none;
background:none;
cursor:pointer;
}

.tab.active{
background:#123222;
color:#fff;
font-weight:bold;
}

.panel{
display:none;
flex:1;
overflow:hidden;
flex-direction:column;
min-height:0;
}

.panel.active{
display:flex;
}

.chat-area{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
display:flex;
flex-direction:column;
}

.msg.user{
align-items:flex-end;
}

.msg.bot{
align-items:flex-start;
}

.bubble{
max-width:92%;
padding:10px;
border-radius:12px;
font-size:13px;
line-height:1.8;
word-break:break-word;
}

.user .bubble{
background:#123222;
color:#fff;
}

.bot .bubble{
background:#f2f2f2;
color:#111;
}

.input-row{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #ddd;
background:#fff;
flex-shrink:0;
}

.chat-input{
flex:1;
height:48px;
padding:10px;
resize:none;
border-radius:10px;
border:1px solid #ccc;
font-size:13px;
font-family:sans-serif;
}

.send-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#123222;
color:#fff;
font-size:18px;
cursor:pointer;
flex-shrink:0;
}

.key-row{
display:flex;
gap:8px;
padding:10px;
}

.key-input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:10px;
font-size:13px;
}

.key-btn{
padding:10px 14px;
border:none;
border-radius:10px;
background:#123222;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.upload-btn{
display:flex;
justify-content:center;
align-items:center;
height:60px;
border:2px dashed #1f6f4a;
border-radius:12px;
background:#f0fff4;
margin:10px;
cursor:pointer;
font-size:13px;
font-weight:bold;
}

input[type=file]{
display:none;
}

.book-list{
flex:1;
overflow-y:auto;
padding:10px;
}

.book-item{
padding:10px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
margin-bottom:8px;
font-size:13px;
line-height:1.7;
}

.history-item{
padding:10px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
margin-bottom:8px;
font-size:13px;
line-height:1.8;
}

.ref{
margin-top:8px;
padding:8px;
background:#fff;
border:1px solid #ddd;
border-radius:8px;
font-size:11px;
}

.info{
padding:10px;
margin:10px;
background:#f0fff4;
border:1px solid #b8e7c7;
border-radius:10px;
font-size:12px;
line-height:1.9;
}

.status{
padding:8px;
font-size:12px;
text-align:center;
background:#f7f7f7;
border-top:1px solid #ddd;
min-height:42px;
flex-shrink:0;
}

.progress-wrap{
width:100%;
height:6px;
background:#ddd;
border-radius:999px;
margin-top:6px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#123222;
transition:.2s;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<h2>☪ ইসলামিক মাসআলা সহায়িকা</h2>
<p>Huge PDF • OCR PDF • Permanent Save • Offline Ready</p>
</div>

<div class="tabs">

<button class="tab active" onclick="showTab('chat',this)">
💬 মাসআলা
</button>

<button class="tab" onclick="showTab('books',this)">
📚 কিতাব
</button>

<button class="tab" onclick="showTab('history',this)">
🕓 হিস্টরি
</button>

<button class="tab" onclick="showTab('settings',this)">
⚙️ সেটিংস
</button>

</div>

<div class="panel active" id="panel-chat">

<div class="chat-area" id="chat-area">

<div class="msg bot">
<div class="bubble">

আসসালামু আলাইকুম 👋<br><br>

১. Groq API Key দিন<br>
২. PDF Upload করুন<br>
৩. তারপর প্রশ্ন করুন

</div>
</div>

</div>

<div class="input-row">

<textarea
class="chat-input"
id="user-input"
placeholder="যেকোনো প্রশ্ন করুন..."
></textarea>

<button
class="send-btn"
onclick="sendMessage()"
>
➤
</button>

</div>

</div>

<div class="panel" id="panel-books">

<div class="key-row">

<input
class="key-input"
id="api-key"
placeholder="gsk_..."
>

<button
class="key-btn"
onclick="saveKey()"
>
সেভ
</button>

</div>

<label class="upload-btn" for="pdf-upload">
📤 PDF Upload করুন
</label>

<input
type="file"
id="pdf-upload"
multiple
accept=".pdf"
onchange="uploadBooks(event)"
>

<div class="book-list" id="book-list"></div>

</div>

<div class="panel" id="panel-history">

<div class="book-list" id="history-list"></div>

</div>

<div class="panel" id="panel-settings">

<div class="info">

✅ Huge PDF Support<br>
✅ OCR Scan PDF Support<br>
✅ Permanent Save<br>
✅ Offline Ready<br>
✅ Fast Upload<br>
✅ History Save<br>
✅ Unlimited Books

</div>

<div style="padding:10px">

<button
class="key-btn"
style="width:100%;margin-bottom:8px"
onclick="clearHistory()"
>
🗑 হিস্টরি Delete
</button>

<button
class="key-btn"
style="width:100%"
onclick="clearBooks()"
>
🗑 সব বই Delete
</button>

</div>

</div>

<div class="status" id="status">

Ready

<div class="progress-wrap">
<div class="progress-bar" id="progress-bar"></div>
</div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let db;
let books = [];
let historyData = [];
let apiKey = '';

window.onload = async function(){

await initDB();

loadKey();

await loadBooks();

loadHistory();

registerSW();

};

function registerSW(){

if('serviceWorker' in navigator){

navigator.serviceWorker.register('./service-worker.js');

}

}

function setStatus(msg){

document.getElementById('status').childNodes[0].nodeValue = msg;

}

function setProgress(value){

document.getElementById('progress-bar').style.width =
value + '%';

}

function initDB(){

return new Promise((resolve,reject)=>{

const request = indexedDB.open('IslamicBooksDB',1);

request.onupgradeneeded = function(e){

db = e.target.result;

if(!db.objectStoreNames.contains('books')){

db.createObjectStore('books',{keyPath:'id'});

}

};

request.onsuccess = function(e){

db = e.target.result;

resolve();

};

request.onerror = function(){

reject();

};

});

}

function saveBook(book){

return new Promise((resolve,reject)=>{

const tx = db.transaction(['books'],'readwrite');

tx.objectStore('books').put(book);

tx.oncomplete = ()=>resolve();

tx.onerror = ()=>reject();

});

}

function loadBooks(){

return new Promise((resolve,reject)=>{

const tx = db.transaction(['books'],'readonly');

const req = tx.objectStore('books').getAll();

req.onsuccess = function(){

books = req.result || [];

renderBooks();

resolve();

};

});

}

function clearBooks(){

if(!confirm('সব বই Delete করবেন?')) return;

const tx = db.transaction(['books'],'readwrite');

tx.objectStore('books').clear();

books = [];

renderBooks();

setStatus('সব বই Delete হয়েছে');

setProgress(0);

}

function saveKey(){

const val =
document.getElementById('api-key').value.trim();

if(!val.startsWith('gsk_')){

setStatus('সঠিক API Key দিন');

return;

}

apiKey = val;

localStorage.setItem('groq_key',val);

setStatus('API Key Save হয়েছে');

}

function loadKey(){

const key = localStorage.getItem('groq_key');

if(key){

apiKey = key;

document.getElementById('api-key').value = key;

}

}

function showTab(name,el){

document.querySelectorAll('.tab').forEach(t=>{
t.classList.remove('active');
});

document.querySelectorAll('.panel').forEach(p=>{
p.classList.remove('active');
});

document.getElementById('panel-'+name)
.classList.add('active');

el.classList.add('active');

if(name==='history'){

renderHistory();

}

}

async function uploadBooks(e){

const files = [...e.target.files];

for(let x=0;x<files.length;x++){

const file = files[x];

setStatus('লোড হচ্ছে: ' + file.name);

setProgress(0);

const pages = await extractPDF(file);

const book = {

id: Date.now()+Math.random(),

name:file.name,

pages

};

books.push(book);

await saveBook(book);

setProgress(100);

setStatus('Save হয়েছে: ' + file.name);

}

renderBooks();

}

async function extractPDF(file){

const arr = await file.arrayBuffer();

const pdf = await pdfjsLib.getDocument({

data:arr,

disableFontFace:true

}).promise;

const pages = [];

for(let i=1;i<=pdf.numPages;i++){

try{

const percent =
Math.floor((i/pdf.numPages)*100);

setProgress(percent);

setStatus('পৃষ্ঠা '+i+' / '+pdf.numPages);

const page = await pdf.getPage(i);

const txt = await page.getTextContent();

let text =
txt.items.map(t=>t.str).join(' ');

if(text.trim().length < 20){

const viewport =
page.getViewport({scale:1});

const canvas =
document.createElement('canvas');

const ctx = canvas.getContext('2d');

canvas.width = viewport.width;

canvas.height = viewport.height;

await page.render({

canvasContext:ctx,

viewport

}).promise;

setStatus('OCR চলছে ' + i);

const result =
await Tesseract.recognize(
canvas,
'eng+ben+ara'
);

text = result.data.text;

}

if(text.length > 1400){

text = text.slice(0,1400);

}

pages.push({

page:i,

text

});

}catch(err){

console.log(err);

}

}

return pages;

}

function renderBooks(){

const list =
document.getElementById('book-list');

if(!books.length){

list.innerHTML =
'<div class="book-item">কোনো বই নেই</div>';

return;

}

list.innerHTML = books.map(b=>`

<div class="book-item">

📚 ${b.name}<br>

পৃষ্ঠা: ${b.pages.length}

</div>

`).join('');

}

function searchBooks(q){

const words =
q.toLowerCase().split(' ');

const result = [];

for(const book of books){

for(const pg of book.pages){

let score = 0;

for(const w of words){

if(pg.text.toLowerCase().includes(w)){

score++;

}

}

if(score>0){

result.push({

book:book.name,

page:pg.page,

text:pg.text,

score

});

}

}

}

result.sort((a,b)=>b.score-a.score);

return result.slice(0,5);

}

async function sendMessage(){

const input =
document.getElementById('user-input');

const q = input.value.trim();

if(!q) return;

if(!apiKey){

setStatus('আগে API Key দিন');

return;

}

if(!books.length){

setStatus('আগে বই Upload করুন');

return;

}

input.value='';

addUser(q);

addBot('কিতাব খোঁজা হচ্ছে...');

const found = searchBooks(q);

let context = '';

found.forEach(r=>{

context += `

বই:${r.book}

পৃষ্ঠা:${r.page}

${r.text}

`;

});

try{

const response = await fetch(

'https://api.groq.com/openai/v1/chat/completions',

{

method:'POST',

headers:{

'Content-Type':'application/json',

'Authorization':'Bearer '+apiKey

},

body:JSON.stringify({

model:'llama-3.3-70b-versatile',

messages:[

{

role:'system',

content:
'আপনি ইসলামিক কিতাব সহায়িকা। কিতাব থেকে হুবহু উত্তর দিবেন। মনগড়া কিছু বলবেন না।'

},

{

role:'user',

content:`প্রশ্ন:${q}

কিতাব:${context}`

}

],

temperature:0.1,

max_tokens:700

})

}

);

const data = await response.json();

removeLastBot();

if(data.error){

addBot('Error: ' + data.error.message);

return;

}

const ans =
data.choices[0].message.content;

let refs = '';

found.forEach(f=>{

refs += `
<div>
📚 ${f.book} | পৃষ্ঠা ${f.page}
</div>
`;

});

addBot(
ans +
`<div class="ref">${refs}</div>`
);

saveHistory(q,ans);

}catch(err){

removeLastBot();

addBot('সমস্যা হয়েছে');

}

}

function saveHistory(q,a){

historyData.unshift({

time:new Date().toLocaleString(),

q,

a

});

localStorage.setItem(

'masala_history',

JSON.stringify(historyData)

);

}

function loadHistory(){

const h =
localStorage.getItem('masala_history');

if(h){

historyData = JSON.parse(h);

}

}

function renderHistory(){

const list =
document.getElementById('history-list');

if(!historyData.length){

list.innerHTML =
'<div class="history-item">কোনো হিস্টরি নেই</div>';

return;

}

list.innerHTML =
historyData.map(h=>`

<div class="history-item">

<b>প্রশ্ন:</b><br>

${h.q}<br><br>

<b>উত্তর:</b><br>

${h.a}

</div>

`).join('');

}

function clearHistory(){

localStorage.removeItem('masala_history');

historyData = [];

renderHistory();

setStatus('হিস্টরি Delete হয়েছে');

}

function addUser(t){

const area =
document.getElementById('chat-area');

const div =
document.createElement('div');

div.className = 'msg user';

div.innerHTML =
`<div class="bubble">${t}</div>`;

area.appendChild(div);

area.scrollTop = area.scrollHeight;

}

function addBot(t){

const area =
document.getElementById('chat-area');

const div =
document.createElement('div');

div.className = 'msg bot';

div.innerHTML =
`<div class="bubble">${t}</div>`;

area.appendChild(div);

area.scrollTop = area.scrollHeight;

}

function removeLastBot(){

const bots =
document.querySelectorAll('.msg.bot');

const last = bots[bots.length-1];

if(last){

last.remove();

}

}

document
.getElementById('user-input')
.addEventListener('keydown',function(e){

if(e.key==='Enter' && !e.shiftKey){

e.preventDefault();

sendMessage();

}

});

</script>

</body>
  </html>
